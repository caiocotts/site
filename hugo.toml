baseurl = "https://caiocotts.com"
title = "Caio Cotts"
theme = "hugo-coder"
languagecode = "en"
defaultcontentlanguage = "en"

pagination.pagerSize = 20

#disqusShortname = "yourdiscussshortname"

[markup.highlight]
style = "github-dark"

# set this to false if you ever do anything that isn't static on this website
# leaving it true makes the website susceptible to cross-site scripting attacks
[markup.goldmark.renderer]
unsafe = true

[params]
author = "Caio Cotts"
info = "Software Engineer"
description = "Caio Cotts' personal website"
keywords = "blog,developer,personal"
#avatarurl = "images/avatar.png"
gravatar = "caio@cotts.com.br"

#faviconSVG = "/img/favicon.svg"
favicon_32 = "/img/favicon-32x32.png"
favicon_16 = "/img/favicon-16x16.png"

#since = 2019

enableTwemoji = true

colorScheme = "auto"
hidecolorschemetoggle = false

customCSS = ["css/projects.css", "css/accolades.css"]
# customSCSS = ["scss/custom.scss"]
# customJS = ["js/custom.js"]

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

